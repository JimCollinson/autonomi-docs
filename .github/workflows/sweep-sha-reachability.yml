name: sweep-sha-reachability

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  reachability:
    name: sweep-sha-reachability
    runs-on: ubuntu-latest
    steps:
      - name: Scope gate
        id: scope
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ "$HEAD_REF" == claude/sweep-* || "$HEAD_REF" == claude/prose-* ]]; then
            echo "in_scope=true" >> "$GITHUB_OUTPUT"
            echo "In scope: head ref is $HEAD_REF" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "in_scope=false" >> "$GITHUB_OUTPUT"
            echo "Out of scope: $HEAD_REF" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout PR head
        if: steps.scope.outputs.in_scope == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: steps.scope.outputs.in_scope == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanner dependencies
        if: steps.scope.outputs.in_scope == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Validate SHA reachability
        if: steps.scope.outputs.in_scope == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          import yaml

          BASE = os.environ["BASE_SHA"]
          HEAD = os.environ["HEAD_SHA"]
          TOKEN = os.environ["GITHUB_TOKEN"]
          SUMMARY_PATH = os.environ.get("GITHUB_STEP_SUMMARY")
          REGISTRY_PATH = "repo-registry.yml"
          VERSION_JSON_PATH = "skills/start/version.json"
          SKILL_MD_PATH = "skills/start/SKILL.md"
          DOCS_PREFIX = "docs/"
          VERIFICATION_BLOCK_RE = re.compile(
              r"<!--\s*verification:(.*?)-->", re.DOTALL
          )
          KEY_VALUE_RE = re.compile(r"^\s*([a-z_]+)\s*:\s*(\S.*?)\s*$")

          violations: list[str] = []
          default_branch_cache: dict[str, str] = {}

          def fail(loc: str, msg: str) -> None:
              violations.append(f"{loc}: {msg}")

          def show(ref: str, path: str) -> str | None:
              try:
                  return subprocess.check_output(
                      ["git", "show", f"{ref}:{path}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
              except subprocess.CalledProcessError:
                  return None

          def github_get(path: str) -> tuple[int, dict | None]:
              url = f"https://api.github.com{path}"
              req = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {TOKEN}",
                      "User-Agent": "autonomi-developer-docs-sweep-sha-reach",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return resp.status, json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  return exc.code, None
              except urllib.error.URLError as exc:
                  fail(url, f"GitHub API network error: {exc.reason}")
                  return -1, None

          def parse_owner_repo(url: str) -> tuple[str, str] | None:
              parsed = urllib.parse.urlparse(url)
              parts = [p for p in parsed.path.strip("/").split("/") if p]
              if parsed.netloc != "github.com" or len(parts) < 2:
                  return None
              owner, repo = parts[0], parts[1]
              if repo.endswith(".git"):
                  repo = repo[: -len(".git")]
              return owner, repo

          def load_registry() -> dict:
              text = show(HEAD, REGISTRY_PATH) or ""
              try:
                  data = yaml.safe_load(text) or {}
              except yaml.YAMLError as exc:
                  fail(REGISTRY_PATH, f"YAML parse error: {exc}")
                  return {}
              return (data or {}).get("repos") or {}

          REGISTRY = load_registry()

          def resolve_default_branch(repo_key: str) -> str | None:
              if repo_key in default_branch_cache:
                  return default_branch_cache[repo_key]
              entry = REGISTRY.get(repo_key)
              if not entry:
                  fail(repo_key, "repo not in repo-registry.yml")
                  return None
              parsed = parse_owner_repo(entry["url"])
              if not parsed:
                  fail(repo_key, f"unparseable url: {entry['url']}")
                  return None
              owner, repo = parsed
              status, body = github_get(f"/repos/{owner}/{repo}")
              if status != 200 or not body:
                  fail(repo_key, f"GET /repos/{owner}/{repo} returned {status}")
                  return None
              branch = body.get("default_branch")
              if not isinstance(branch, str) or not branch:
                  fail(repo_key, "default_branch missing in repo metadata")
                  return None
              default_branch_cache[repo_key] = branch
              return branch

          def validate_sha(
              loc: str, repo_key: str, ref: str, sha: str
          ) -> None:
              entry = REGISTRY.get(repo_key)
              if not entry:
                  fail(loc, f"repo not in repo-registry.yml: {repo_key}")
                  return
              parsed = parse_owner_repo(entry["url"])
              if not parsed:
                  fail(loc, f"unparseable url: {entry['url']}")
                  return
              owner, repo = parsed
              status, _ = github_get(f"/repos/{owner}/{repo}/commits/{sha}")
              if status != 200:
                  fail(
                      loc,
                      f"{repo_key}@{sha[:7]} not reachable on github.com "
                      f"(GET /commits/{sha} -> {status})",
                  )
                  return
              encoded_ref = urllib.parse.quote(ref, safe="")
              compare_status, body = github_get(
                  f"/repos/{owner}/{repo}/compare/{sha}...{encoded_ref}"
              )
              if compare_status != 200 or not body:
                  fail(
                      loc,
                      f"{repo_key}: compare {sha[:7]}...{ref} returned "
                      f"{compare_status}",
                  )
                  return
              compare_state = body.get("status")
              if compare_state not in ("ahead", "identical"):
                  fail(
                      loc,
                      f"{repo_key}: recorded SHA {sha[:7]} is not an "
                      f"ancestor of {ref} (compare status: {compare_state}); "
                      "force-push or ref-rewrite suspected",
                  )

          def parse_block_fields(body: str) -> dict[str, str]:
              fields: dict[str, str] = {}
              for raw_line in body.splitlines():
                  match = KEY_VALUE_RE.match(raw_line.strip())
                  if match:
                      fields[match.group(1)] = match.group(2)
              return fields

          def line_of_offset(text: str, offset: int) -> int:
              return text.count("\n", 0, offset) + 1

          def block_intervals(text: str) -> list[tuple[int, int, str]]:
              # (start_line, end_line, body) for each block
              out: list[tuple[int, int, str]] = []
              for match in VERIFICATION_BLOCK_RE.finditer(text):
                  start_line = line_of_offset(text, match.start())
                  end_line = line_of_offset(text, match.end())
                  out.append((start_line, end_line, match.group(1)))
              return out

          # Identify changed verification blocks: any block in HEAD whose
          # content (full match text) differs from any block in BASE that
          # spans the same lines, OR that has no exact match in BASE.
          def changed_blocks_in_doc(
              base_text: str, head_text: str
          ) -> list[tuple[int, str]]:
              base_block_set = {
                  match.group(0) for match in VERIFICATION_BLOCK_RE.finditer(base_text)
              }
              changed: list[tuple[int, str]] = []
              for match in VERIFICATION_BLOCK_RE.finditer(head_text):
                  if match.group(0) in base_block_set:
                      continue
                  changed.append(
                      (line_of_offset(head_text, match.start()), match.group(1))
                  )
              return changed

          # 1) docs/**/*.md changed verification blocks
          name_status = subprocess.check_output(
              ["git", "diff", "--name-status", "-z", f"{BASE}..{HEAD}"],
              text=True,
          )
          tokens = [t for t in name_status.split("\0") if t]
          changed_paths: list[str] = []
          i = 0
          while i < len(tokens):
              status = tokens[i]
              if status.startswith(("R", "C")):
                  if i + 2 < len(tokens):
                      changed_paths.append(tokens[i + 2])
                  i += 3
              else:
                  if i + 1 < len(tokens):
                      changed_paths.append(tokens[i + 1])
                  i += 2

          docs_changed = [
              p for p in changed_paths if p.startswith(DOCS_PREFIX) and p.endswith(".md")
          ]

          for path in sorted(set(docs_changed)):
              base_text = show(BASE, path) or ""
              head_text = show(HEAD, path) or ""
              for start_line, body in changed_blocks_in_doc(base_text, head_text):
                  fields = parse_block_fields(body)
                  loc = f"{path}:{start_line}"
                  required = ("source_repo", "source_ref", "source_commit")
                  if any(k not in fields for k in required):
                      fail(loc, "verification block missing required keys")
                      continue
                  if fields.get("verification_mode") == "target-manifest":
                      # SHA reachability against a moving HEAD is not
                      # meaningful for target-manifest pins. They were
                      # validated by hand at pin time.
                      continue
                  validate_sha(
                      loc,
                      fields["source_repo"],
                      fields["source_ref"],
                      fields["source_commit"],
                  )

          # 2) version.json post-image verified_commits
          if VERSION_JSON_PATH in changed_paths:
              head_text = show(HEAD, VERSION_JSON_PATH) or ""
              try:
                  obj = json.loads(head_text)
              except json.JSONDecodeError as exc:
                  fail(VERSION_JSON_PATH, f"JSON parse error: {exc}")
                  obj = {}
              if obj.get("verification_mode") == "target-manifest":
                  pass
              else:
                  commits = obj.get("verified_commits") or {}
                  for repo_key, sha in sorted(commits.items()):
                      ref = resolve_default_branch(repo_key)
                      if ref is None:
                          continue
                      loc = f"{VERSION_JSON_PATH}:verified_commits.{repo_key}"
                      validate_sha(loc, repo_key, ref, sha)

          # 3) SKILL.md post-image frontmatter verified_commits
          if SKILL_MD_PATH in changed_paths:
              head_text = show(HEAD, SKILL_MD_PATH) or ""
              if not head_text.startswith("---"):
                  fail(SKILL_MD_PATH, "missing YAML frontmatter")
              else:
                  end = head_text.find("\n---", 3)
                  if end < 0:
                      fail(SKILL_MD_PATH, "unterminated YAML frontmatter")
                  else:
                      raw = head_text[3:end]
                      try:
                          fm = yaml.safe_load(raw) or {}
                      except yaml.YAMLError as exc:
                          fail(SKILL_MD_PATH, f"frontmatter YAML parse error: {exc}")
                          fm = {}
                      if fm.get("verification_mode") == "target-manifest":
                          pass
                      else:
                          commits = fm.get("verified_commits") or {}
                          for repo_key, sha in sorted(commits.items()):
                              ref = resolve_default_branch(repo_key)
                              if ref is None:
                                  continue
                              loc = (
                                  f"{SKILL_MD_PATH}:verified_commits.{repo_key}"
                              )
                              validate_sha(loc, repo_key, ref, sha)

          if violations:
              if SUMMARY_PATH:
                  with open(SUMMARY_PATH, "a", encoding="utf-8") as out:
                      out.write("## sweep-sha-reachability failures\n\n")
                      for v in violations:
                          out.write(f"- `{v}`\n")
              for v in violations:
                  print(v, file=sys.stderr)
              sys.exit(1)

          if SUMMARY_PATH:
              with open(SUMMARY_PATH, "a", encoding="utf-8") as out:
                  out.write("sweep-sha-reachability: all SHAs reachable.\n")
          PY
